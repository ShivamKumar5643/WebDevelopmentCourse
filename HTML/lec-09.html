<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>id & classes in html</title>
    <link rel="stylesheet" href="lec-09.css">
</head>
<body>
    <!--An id is an attribute, a unique identifier assigned to only one HTML element within a page.It is often used for unique styling and JavaScript manipulations-->
    
    <!--The class attribute lets you give the same name to multiple HTML elements.That way,you can easily change their look or behaviour all at once. Classes are not unique and can be assigned to multiple elements.They are generally used for applying the same styles or behaviors to a group of elements-->

    <div id="firstdiv" class="red yellow">first</div> <!-- we can assign multiple classes in same element -->
    <div id="seconddiv">second</div>
    <span class="red"></span>
</body>
</html>
