<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>image,list,table</title>
    <link rel="stylesheet" href="lec-05.css">
</head>

<body>
    <img width="230" src="shivam.png" alt="me"> <!--Height will automatically set or viceversa-->
    <table>
        <caption>Employee Details</caption>
        <thead>
        <tr>
            <th>Name</th>
            <th>Designation</th>
            <th>Fav Lang</th>
        </tr>
        </thead>
        <tbody>     <!--tfoot is also there-->
        <tr>
            <td>carry</td>
            <td>Senior WebDeveloper</td>
            <td>Java</td>
        </tr>
        <tr>
            <td colspan="2">Shivam</td>

            <td rowspan="2">Java</td>
        </tr>
        <tr>
            <td>Harry</td>
            <td>Senior WebDeveloper</td>
           
        </tr>
        </tbody>
    </table>
    <ul type="circle">
       <li>Shivam</li> 
       <li>carry</li>
       <li>harry</li>
    </ul>
    <ol type ="a">
       <li>Shivam</li> 
       <li>carry</li>
       <li>harry</li>
    </ol>
    <dl>        <!--Defination list-->
       <dt>HTML</dt>
       <dd>Hyper Text Markup Language</dd>
       <dt>CSS</dt>
       <dd>Cascading Style Sheets</dd>
       <dt>Js</dt>
       <dd>Java Script</dd>
    </dl>
</body>

</html>
