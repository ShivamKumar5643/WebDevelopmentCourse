<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<body>
  <h1>DREAM EDUCATION</h1>
  <br>
  <h3>Welcome to Dream Education Sasaram </h3>
  <form>

    <FIEldset style="background-color: rgb(86, 84, 84); color:rgb(152, 152, 228)">
      <legend>Dream Education Registration Form</legend>
      <label style="color:blue" for="email">Enter Email id:</label>
      <input type="text" id="email" placeholder="abc@gmail.com">
      <br />
      <br />
      <label style="color:blue" for="password">Enter Password:</label>
      <input type="text" id="password" placeholder="xyz12##@">
      <br />
      <br />
      <input type="submit" value="Click here" style="background-color:yellow">
      <button style="background-color:red;">submit here</button>
      <br>
      <br>
      <label style="color:blue" for="dates">Choose DOB:</label>
      <input style="background-color:bisque" type="date" id="dates">
      <br>
      <br>
      <label for="selector">Choose your course:</label>
      <select name="courses" id="selector">
        <option value="jee">JEE</option>
        <option value="jee">NEET</option>
        <option value="jee">CA</option>
      </select>
      <br>
      <br>
      <label for="address">Enter your address:</label>
      <textarea style="BACKGROUND-color: blue;" name="ADDRESS" id="address" cols="12" rows="3"
        placeholder="Your Address"></textarea>
      <br>
      <br>
      <label for="Image">Image</label>
      <input type="file" id="Image">



    </FIEldset>
  </form>
  
</body>

</html>
