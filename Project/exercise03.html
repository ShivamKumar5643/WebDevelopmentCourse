<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login page</title>
    <style>
        *{
            margin:0;padding: 0;
        }
        .r1{
            border: 1px solid green;
            height: 33vh;width: 100vw;
        }
        .r2{
              border: 1px solid green;
            height: 33vh;width: 100vw;
        }
        .r3{
            border: 1px solid green;
            height: 34vh;width: 100vw;
        }
        .d1{
            border: 1px solid red;
            width: 33vw;
        }
        .d2{
             border: 1px solid red;
            width: 34vw;
        }
        .d3{
             border: 1px solid red;
            width: 33vw;
        }

    </style>
</head>
<body>
    <table>
        <tr>
            <div class="r1"></div>
        </tr>
        <tr>
            <div class="r2">
                <td>
                    <div class="d1"></div>
                </td>
                <td>
                    <div class="d2"></div>
                </td>
                <td>
                    <div class="d3"></div>
                </td>
            </div>
        </tr>
        <tr>
            <div class="r3"></div>
        </tr>
    </table>
    
</body>
</html>
