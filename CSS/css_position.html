<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS POSITION</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        .box {
            border: 2px solid black;
            height: 433px;
            width: 80vw;
            padding: 3px;
            margin: 3px;

        }

        .box1 {
            background-color: aqua;
            /*position: relative;
            z-index: 1;*/
            position: absolute;
            top: 0px;left: 0px;
            /*position: sticky; 
            top:0;
            height: 111px;margin: 0;padding: 0;width: 100%;*/
 }

        .box2 {
            background-color: azure;
            /*position: relative;
            top: 34px;
            left: 56px;*/
           
        }

        .box3 {
            background-color: antiquewhite;
            /*position: fixed;
            bottom: 0px;left: 8vw;height: 113px;*/
        }

        .box4 {
            background-color: purple;
        }
        .parent{
            border: 2px solid purple;
            padding: 43px;margin: 34px;
            /*EXCEPTION:transform,filter and prespective properties can also make an element appeard as position*/
            
            position: absolute;
        }
    </style>
</head>

<body>
    <div class="parent">
        <div class="box box1"></div>
        <div class="box box2"></div>
        <div class="box box3"></div>
        <div class="box box4"></div>
    </div>



</body>

</html>
