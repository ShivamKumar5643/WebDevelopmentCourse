<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS SHADOW AND OUTLINE</title>
    <style>
        .box{
            border: 2px solid red;
            padding: 34px;display:flex;justify-content: center;
            box-shadow: -5px 11px 17px 1px rgb(69, 28, 28);
            text-shadow: 2px 2px 4px;
        }
        .xy{
            outline: 2px dotted red;
            outline-offset: 23px;
            border-radius: 12px;
        }
    </style>
</head>
<body>
    <div class="box">
        Hii I am a Box
    </div>
    <br><br>
    <div class="xy">
        Lorem ipsum dolor, sit amet consectetur adipisicing elit. Corporis debitis illum, a harum odit dolor. Et reiciendis recusandae tenetur exercitationem!
    </div>
    
</body>
</html>
