<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Styling List</title>
    <style>
        nav ul li{
            list-style: disc;
            /*list-style-type:"🥳";*/
           /* list-style-image: ;*/

            list-style-position: inside;
            border: 2px solid black;
        }

</head>
<body>
    <nav>
        <ul>
            <li>home</li>
            <li>about</li>
            <li>myself</li>
        </ul>
