<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS BOX MODEL</title>
    <style>
        .box{
            background-color: aqua;
        }
        *{
            margin: 0;padding: 0;
        }
        .box1{
            color:brown;padding:10px;margin: 10px;border:2px solid blueviolet;height:200px

        }
        .box2{
            color:green
        }
        
    </style>
</head>
<body>
    <div class="box box1"><h1>I am a box</h1></div>
    <div class="box box2"><h1>I am another box</h1></div>
</body>
</html>
