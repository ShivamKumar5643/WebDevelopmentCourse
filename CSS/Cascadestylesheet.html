<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css implementation</title>
    <style>
        /*child selector*/
        div>h1{
            color: aqua;background-color: aliceblue;
        }

       /*desecndent selector*/
       div h1{
        color: aqua;background-color: aliceblue;
       }

       /*universal selector*/
       *{
        margin: 0;padding: 0;
       }

       /*psuedo selector*/
        a:visited{
            color:brown
        }
        a:link{
            color:rgb(2, 0, 1)
        }
        a:active{
            background-color: black;
        }
        a:hover{
            background-color: rgb(200, 255, 0);
        }
        



    </style>
</head>
